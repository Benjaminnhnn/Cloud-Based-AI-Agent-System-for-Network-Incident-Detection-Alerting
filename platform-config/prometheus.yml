global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aiops-monitor'

# Alerting rules
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter on monitor server (running on host)
  - job_name: 'node_exporter_monitor'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'monitor-ai-01'
          service: 'system'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Node Exporter on web server
  - job_name: 'node_exporter_web'
    static_configs:
      - targets: ['10.10.1.68:9100']
        labels:
          instance: 'bank-web-01'
          service: 'system'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Node Exporter on core server
  - job_name: 'node_exporter_core'
    static_configs:
      - targets: ['10.10.1.78:9100']
        labels:
          instance: 'bank-core-01'
          service: 'system'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Blackbox HTTP probe for web endpoint
  - job_name: 'blackbox_http_web'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ['http://18.136.112.28/health']
        labels:
          instance: 'bank-web-01'
          service: 'web-endpoint'
          endpoint: '/health'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: localhost:9115
      - source_labels: [__param_target]
        target_label: target
