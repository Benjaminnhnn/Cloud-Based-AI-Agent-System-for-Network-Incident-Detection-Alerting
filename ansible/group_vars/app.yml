---
# Web and Core Application Servers Configuration

# Service deployment on app servers
services:
  nginx:
    enabled: yes
    port: 80
    status: installed
    health_check_port: 8080
    severity: CRITICAL
    
  postgresql:
    enabled: yes
    port: 5432
    status: installed
    severity: CRITICAL
    config:
      listen_addresses: "0.0.0.0"
      max_connections: 200
      shared_buffers: "256MB"
    
  redis:
    enabled: yes
    port: 6379
    status: installed
    severity: HIGH
    config:
      bind: "0.0.0.0"
      maxmemory: "1gb"
      
  docker:
    enabled: yes
    status: installed
    severity: HIGH
    compose_version: "1.29.2"
    config:
      log_driver: "json-file"
      storage_driver: "overlay2"

# Application deployment
application:
  name: "demo-web"
  path: "/opt/demo-web"
  user: "appuser"
  group: "appgroup"
  
# Database configuration
database:
  type: "postgresql"
  host: "localhost"
  port: 5432
  name: "app_db"
  backup_enabled: yes
  backup_schedule: "0 2 * * *"  # Daily at 2 AM

# Cache configuration  
cache:
  type: "redis"
  host: "localhost"
  port: 6379
  ttl: 3600

# Monitoring client
monitoring_client:
  enabled: yes
  check_interval: 30
  report_to: "{{ groups['monitor'][0] }}"
