# Monitor-specific variables
---
# AI Agent configuration
ai_agent:
  enabled: yes
  service_name: ai-agent
  port: 8000
  docker_image: "aws-hybrid_ai-agent:latest"

# Default values (can be overridden by environment variables)
# These MUST be set before deployment:
# export GEMINI_API_KEY="..."
# export TELEGRAM_TOKEN="..."  
# export TELEGRAM_CHAT_ID="..."
ai_agent_env:
  GEMINI_API_KEY: "{{ lookup('env', 'GEMINI_API_KEY') | default('NOT_SET') }}"
  TELEGRAM_TOKEN: "{{ lookup('env', 'TELEGRAM_TOKEN') | default('NOT_SET') }}"
  TELEGRAM_CHAT_ID: "{{ lookup('env', 'TELEGRAM_CHAT_ID') | default('NOT_SET') }}"
  LOG_LEVEL: "INFO"
  DEBUG: "false"

# Docker configuration for monitor
docker:
  enabled: yes
  compose_version: "1.29.2"
  networks:
    - name: aws-hybrid_aiops-network
      driver: bridge

# Prometheus configuration
prometheus:
  enabled: yes
  port: 9090
  scrape_interval: 15s
  retention: 30d

# AlertManager configuration
alertmanager:
  enabled: yes
  port: 9093
  webhook_receiver: "aiops-webhook"
  webhook_url: "http://localhost:8000/webhook"

# ============ Module 2: Log Watcher & Unified Monitor ============
# Unified Monitoring System (Module 1 + Module 2)
monitoring_system:
  enabled: yes
  
  # Event Queue
  event_queue:
    max_size: 1000
    put_timeout: 5
    get_timeout: 1
    batch_size: 50

  # Log Watcher (Module 2)
  log_watcher:
    enabled: yes
    watch_paths:
      - /var/log/syslog
      - /var/log/nginx/error.log
      - /var/log/apache2/error.log
      - /var/log/mysql/error.log
      - /var/log/docker
    error_keywords:
      - ERROR
      - CRITICAL
      - FATAL
      - EXCEPTION
      - FAILED
      - PANIC
    webhook_url: "http://localhost:8000/webhook"

  # Service Monitor (Unified Consumer)
  service_monitor:
    enabled: yes
    check_interval: 5
    alert_cooldown: 60
    prometheus_url: "http://localhost:9090"
    alertmanager_url: "http://localhost:9093"
    webhook_url: "http://localhost:8000/webhook"

  # Services Configuration
  services:
    nginx:
      enabled: yes
      port: 80
      severity: CRITICAL
    postgresql:
      enabled: yes
      port: 5432
      severity: CRITICAL
    redis:
      enabled: yes
      port: 6379
      severity: HIGH
    docker:
      enabled: yes
      severity: HIGH
    system:
      enabled: yes
      severity: CRITICAL

  # Alert Thresholds
  thresholds:
    cpu_warning: 75
    cpu_critical: 85
    memory_warning: 80
    memory_critical: 90
    disk_warning: 75
    disk_critical: 85

  # Recovery Actions
  recovery_actions:
    nginx_restart:
      enabled: yes
      cooldown: 300
      max_attempts: 3
    postgresql_restart:
      enabled: yes
      cooldown: 600
      max_attempts: 1
    docker_restart:
      enabled: yes
      cooldown: 600
      max_attempts: 1

  # Logging Configuration
  logging:
    level: INFO
    directory: /var/log/ai-agent
    file_size: 100m
    backup_count: 10

  # Systemd Service
  systemd_service:
    name: module2-watcher
    enabled: yes
    restart: always
    restart_sec: 5
    cpu_quota: 50%
    memory_limit: 500M
