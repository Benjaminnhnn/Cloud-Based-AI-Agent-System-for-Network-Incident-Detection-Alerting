# Global variables for all hosts
---
# Application settings
app_name: "aiops-bank"
environment: "dev"
project_owner: "aiops-team"

# Directory structure
app_root: "/opt/aiops"
data_root: "/var/aiops"
log_root: "/var/log/aiops"

# Python settings
python_version: "3.9"
python_requirements:
  - requests
  - watchdog
  - python-json-logger
  - prometheus-client

# System settings
timezone: "Asia/Ho_Chi_Minh"
ntp_enabled: true
ntp_servers:
  - 0.amazon.pool.ntp.org
  - 1.amazon.pool.ntp.org

# Deployment settings
deployment_environment: "production"
aws_region: "ap-southeast-1"

# Common service ports
service_ports:
  webhook: 8000
  prometheus: 9090
  alertmanager: 9093
  nginx: 80
  postgresql: 5432
  redis: 6379
  docker: 2375

# Notification settings
telegram_enabled: true
# These should be set from environment variables
telegram_bot_token: "{{ lookup('env', 'TELEGRAM_TOKEN') | default('') }}"
telegram_chat_id: "{{ lookup('env', 'TELEGRAM_CHAT_ID') | default('') }}"

# AI Service configuration
gemini_api_key: "{{ lookup('env', 'GEMINI_API_KEY') | default('') }}"

# Monitoring defaults
monitoring_defaults:
  check_interval: 5
  alert_cooldown: 60
  max_queue_size: 1000
  batch_size: 50

# Logging defaults
logging_defaults:
  level: INFO
  format: "[%(asctime)s] [%(levelname)s] %(message)s"
  max_file_size: 100m
  backup_count: 10

# Security settings
firewall_enabled: true
selinux_mode: "disabled"

# Monitoring settings
monitor_enabled: true
metrics_collection_interval: 300  # seconds

# Backup settings
backup_enabled: true
backup_retention_days: 30
