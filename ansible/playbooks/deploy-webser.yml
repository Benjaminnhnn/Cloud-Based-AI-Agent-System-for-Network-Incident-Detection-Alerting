---
# Deploy Demo Web Application to AWS Servers using Ansible
- name: Deploy Backend API
  hosts: api
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Update system packages
      yum:
        name: '*'
        state: latest
      register: yum_update
      retries: 3
      delay: 10
    
    - name: Install Docker
      yum:
        name: docker
        state: present
      register: docker_install
      retries: 3
      delay: 10
    
    - name: Start Docker service
      systemd:
        name: docker
        state: started
        enabled: yes
    
    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes
    
    - name: Install Docker Compose
      shell: |
        curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        chmod +x /usr/local/bin/docker-compose
      args:
        creates: /usr/local/bin/docker-compose
    
    - name: Create app directory
      file:
        path: /home/ec2-user/demo-web/backend
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'
    
    - name: Copy backend files
      copy:
        src: ../../demo-web/backend/
        dest: /home/ec2-user/demo-web/backend/
        owner: ec2-user
        group: ec2-user
        mode: '0755'
    
    - name: Copy docker-compose
      copy:
        src: ../../docker-compose.yml
        dest: /home/ec2-user/docker-compose.yml
        owner: ec2-user
        group: ec2-user
    
    - name: Start API service with docker-compose
      shell: |
        cd /home/ec2-user
        docker-compose up -d db api
      become: no
      environment:
        HOME: /home/ec2-user
      retries: 3
      delay: 5
    
    - name: Wait for API to be ready
      uri:
        url: http://localhost:8000/api/health
        status_code: 200
      retries: 15
      delay: 5
      register: api_ready

- name: Deploy Frontend Web
  hosts: web
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Update system packages
      yum:
        name: '*'
        state: latest
      register: yum_update
      retries: 3
      delay: 10
    
    - name: Install Docker
      yum:
        name: docker
        state: present
      register: docker_install
      retries: 3
      delay: 10
    
    - name: Start Docker service
      systemd:
        name: docker
        state: started
        enabled: yes
    
    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes
    
    - name: Install Docker Compose
      shell: |
        curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        chmod +x /usr/local/bin/docker-compose
      args:
        creates: /usr/local/bin/docker-compose
    
    - name: Create app directory
      file:
        path: /home/ec2-user/demo-web/frontend
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'
    
    - name: Copy frontend files
      copy:
        src: ../../demo-web/frontend/
        dest: /home/ec2-user/demo-web/frontend/
        owner: ec2-user
        group: ec2-user
        mode: '0755'
    
    - name: Copy docker-compose
      copy:
        src: ../../docker-compose.yml
        dest: /home/ec2-user/docker-compose.yml
        owner: ec2-user
        group: ec2-user
    
    - name: Start Frontend service
      shell: |
        cd /home/ec2-user
        docker-compose up -d web
      become: no
      environment:
        HOME: /home/ec2-user
        REACT_APP_API_URL: "http://52.77.15.93:8000"
      retries: 3
      delay: 5
    
    - name: Wait for frontend to be ready
      uri:
        url: http://localhost:3000
        status_code: 200
      retries: 15
      delay: 5
      register: web_ready

- name: Deploy Monitoring Stack
  hosts: monitor
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Update system packages
      yum:
        name: '*'
        state: latest
      register: yum_update
      retries: 3
      delay: 10
    
    - name: Install Docker
      yum:
        name: docker
        state: present
      register: docker_install
      retries: 3
      delay: 10
    
    - name: Start Docker service
      systemd:
        name: docker
        state: started
        enabled: yes
    
    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes
    
    - name: Install Docker Compose
      shell: |
        curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        chmod +x /usr/local/bin/docker-compose
      args:
        creates: /usr/local/bin/docker-compose
    
    - name: Create monitoring directory
      file:
        path: /home/ec2-user/demo-web
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'
    
    - name: Copy docker-compose
      copy:
        src: ../../docker-compose.yml
        dest: /home/ec2-user/docker-compose.yml
        owner: ec2-user
        group: ec2-user
    
    - name: Copy prometheus config
      copy:
        src: ../../prometheus.yml
        dest: /home/ec2-user/prometheus.yml
        owner: ec2-user
        group: ec2-user
    
    - name: Start monitoring services
      shell: |
        cd /home/ec2-user
        docker-compose up -d prometheus grafana node_exporter
      become: no
      environment:
        HOME: /home/ec2-user
      retries: 3
      delay: 5
    
    - name: Wait for Prometheus to be ready
      uri:
        url: http://localhost:9090
        status_code: 200
      retries: 15
      delay: 5
      register: prometheus_ready
    
    - name: Wait for Grafana to be ready
      uri:
        url: http://localhost:3001
        status_code: 200
      retries: 15
      delay: 5
      register: grafana_ready

