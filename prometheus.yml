global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aiops-monitor'

# Alerting rules
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - System metrics (Docker)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']
        labels:
          instance: 'localhost'
          service: 'system'

  # FastAPI Backend - Application metrics
  - job_name: 'aiops_api'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'api'
          component: 'backend'
    metrics_path: '/api/metrics'
    scrape_interval: 10s
