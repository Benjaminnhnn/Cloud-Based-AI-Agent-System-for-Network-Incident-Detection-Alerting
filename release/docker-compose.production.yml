version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: redis-prod
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aiops-network

  ai-agent:
    image: ghcr.io/${GHCR_OWNER:-your-org}/aws-hybrid-ai-agent:${IMAGE_TAG:-latest}
    container_name: ai-agent-prod
    restart: always
    env_file:
      - .env.production
    environment:
      AI_AGENT_PORT: "8000"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - aiops-network
    depends_on:
      redis:
        condition: service_healthy

  celery-worker:
    image: ghcr.io/${GHCR_OWNER:-your-org}/aws-hybrid-ai-agent:${IMAGE_TAG:-latest}
    container_name: celery-worker-prod
    restart: always
    env_file:
      - .env.production
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      PYTHONUNBUFFERED: "1"
    command: ["celery", "-A", "core.celery_app.celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aiops-network

  log-watcher:
    image: ghcr.io/${GHCR_OWNER:-your-org}/aws-hybrid-ai-agent:${IMAGE_TAG:-latest}
    container_name: log-watcher-prod
    restart: always
    env_file:
      - .env.production
    environment:
      WEBHOOK_URL: http://ai-agent:8000/webhook
      LOG_FILES: /var/log/syslog,/var/log/cloud-init.log,/var/log/dnf.log,/tmp/test_syslog.log
      PYTHONUNBUFFERED: "1"
    command: ["sh", "-c", "sed -i 's|WEBHOOK_URL = \"http://localhost:8000/webhook\"|WEBHOOK_URL = \"http://ai-agent:8000/webhook\"|' log_watcher.py && python log_watcher.py"]
    volumes:
      - /var/log:/var/log:ro
      - /tmp/aiops-test-syslog.log:/tmp/test_syslog.log:ro
    depends_on:
      ai-agent:
        condition: service_healthy
    networks:
      - aiops-network

  payment-api:
    image: ghcr.io/${GHCR_OWNER:-your-org}/aws-hybrid-payment-api:${IMAGE_TAG:-latest}
    container_name: payment-api-prod
    restart: always
    env_file:
      - .env.production
    environment:
      ENVIRONMENT: production
    ports:
      - "127.0.0.1:8080:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - aiops-network

networks:
  aiops-network:
    driver: bridge

volumes:
  redis-data-prod:
