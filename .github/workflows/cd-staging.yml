name: CD Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image variables
        id: vars
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=staging-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push AI Agent
        uses: docker/build-push-action@v6
        with:
          context: ./agent_src
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/aws-hybrid-ai-agent:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/aws-hybrid-ai-agent:staging-latest

      - name: Build & push Payment API
        uses: docker/build-push-action@v6
        with:
          context: ./demo-web/backend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/aws-hybrid-payment-api:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/aws-hybrid-payment-api:staging-latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_AGENT_PUBLIC_URL: ${{ secrets.AI_AGENT_PUBLIC_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          cp release/.env.example release/.env.staging
          cp release/.env.example release/.env.production
          sed -i "s/^GHCR_OWNER=.*/GHCR_OWNER=${{ needs.build-and-push.outputs.owner_lc }}/" release/.env.staging
          sed -i "s/^GHCR_OWNER=.*/GHCR_OWNER=${{ needs.build-and-push.outputs.owner_lc }}/" release/.env.production
          python - <<'PY'
          import os
          from pathlib import Path

          values = {"ENVIRONMENT": "staging"}
          for key in (
              "GEMINI_API_KEY",
              "TELEGRAM_TOKEN",
              "TELEGRAM_CHAT_ID",
              "AI_AGENT_PUBLIC_URL",
              "DATABASE_URL",
              "SECRET_KEY",
          ):
              value = os.environ.get(key, "")
              if value:
                  values[key] = value

          for env_file in (Path("release/.env.staging"), Path("release/.env.production")):
              lines = env_file.read_text().splitlines()
              existing = {line.split("=", 1)[0] for line in lines if "=" in line and not line.startswith("#")}
              updated = []
              for line in lines:
                  key = line.split("=", 1)[0] if "=" in line and not line.startswith("#") else None
                  updated.append(f"{key}={values[key]}" if key in values else line)
              for key, value in values.items():
                  if key not in existing:
                      updated.append(f"{key}={value}")
              env_file.write_text("\n".join(updated) + "\n")
          PY

      - name: Preflight SSH authentication
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/deploy_key -p "$SSH_PORT" ec2-user@"$SSH_HOST" 'echo auth-ok'
          rm -f ~/.ssh/deploy_key

      - name: Setup EC2 directory and install Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          timeout: 120s
          command_timeout: 120s
          script: |
            mkdir -p /home/ec2-user/aws-hybrid/{release,automation}
            echo "Directories created"

      - name: Install Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          timeout: 180s
          command_timeout: 180s
          script: |
            set -euo pipefail
            if command -v docker >/dev/null 2>&1; then
              echo "Docker already installed: $(docker --version)"
              exit 0
            fi

            echo "Installing Docker..."
            if command -v dnf >/dev/null 2>&1; then
              sudo dnf -y install docker
            elif command -v yum >/dev/null 2>&1; then
              sudo yum -y install docker
            elif command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io
            else
              echo "Unsupported package manager. Cannot install Docker."
              exit 1
            fi

            sudo systemctl enable --now docker
            sudo groupadd -f docker || true
            if id -u ec2-user >/dev/null 2>&1; then
              sudo usermod -aG docker ec2-user || true
            fi
            echo "Docker installed: $(docker --version)"

      - name: Install Docker Compose 
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          timeout: 120s
          command_timeout: 120s
          script: |
            set -euo pipefail
            if docker compose version >/dev/null 2>&1 || command -v docker-compose >/dev/null 2>&1; then
              echo "Docker Compose already available"
              exit 0
            fi

            echo "Installing Docker Compose..."
            if command -v dnf >/dev/null 2>&1; then
              sudo dnf -y install docker-compose-plugin || true
            elif command -v yum >/dev/null 2>&1; then
              sudo yum -y install docker-compose-plugin || sudo yum -y install docker-compose || true
            elif command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin || sudo apt-get install -y docker-compose || true
            fi

            if ! docker compose version >/dev/null 2>&1 && ! command -v docker-compose >/dev/null 2>&1; then
              if command -v curl >/dev/null 2>&1; then
                sudo curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
                sudo chmod +x /usr/local/bin/docker-compose
              fi
            fi

            if docker compose version >/dev/null 2>&1 || command -v docker-compose >/dev/null 2>&1; then
              echo "Docker Compose installed successfully"
            else
              echo "Docker Compose installation failed"
              docker --version || true
              command -v docker-compose || true
              docker compose version || true
              exit 1
            fi

      - name: Copy files to EC2 using SCP
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/deploy_key -r release/ ec2-user@${{ secrets.SSH_HOST }}:/home/ec2-user/aws-hybrid/
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/deploy_key -r automation/ ec2-user@${{ secrets.SSH_HOST }}:/home/ec2-user/aws-hybrid/
          rm ~/.ssh/deploy_key

      - name: Run deploy script on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          timeout: 300s
          command_timeout: 600s
          script: |
            cd /home/ec2-user/aws-hybrid
            chmod +x automation/deploy.sh
            export GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            export GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            export GHCR_OWNER="${{ needs.build-and-push.outputs.owner_lc }}"
            ./automation/deploy.sh staging "${{ needs.build-and-push.outputs.image_tag }}"
