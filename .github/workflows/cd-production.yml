name: CD Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push AI Agent
        uses: docker/build-push-action@v6
        with:
          context: ./agent_src
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/aws-hybrid-ai-agent:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/aws-hybrid-ai-agent:${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/aws-hybrid-ai-agent:latest

      - name: Build & push Payment API
        uses: docker/build-push-action@v6
        with:
          context: ./demo-web/backend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/aws-hybrid-payment-api:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/aws-hybrid-payment-api:${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/aws-hybrid-payment-api:latest

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment files
        run: |
          cp release/.env.example release/.env.staging
          cp release/.env.example release/.env.production

      - name: Setup EC2 directory and install Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          timeout: 120s
          command_timeout: 120s
          script: |
            mkdir -p /opt/aws-hybrid/{release,automation}
            echo "Directories created"

      - name: Install Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          timeout: 180s
          command_timeout: 180s
          script: |
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo yum update -y
              sudo yum install docker -y
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
              echo "Docker installed and started"
            else
              echo "Docker already installed"
            fi

      - name: Install Docker Compose 
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          timeout: 120s
          command_timeout: 120s
          script: |
            if ! command -v docker-compose &> /dev/null; then
              echo "Installing Docker Compose..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              echo "Docker Compose installed"
            else
              echo "Docker Compose already installed"
            fi

      - name: Copy files to EC2 using SCP
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/deploy_key -r release/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/aws-hybrid/
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/deploy_key -r automation/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/aws-hybrid/
          rm ~/.ssh/deploy_key

      - name: Run deploy script on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          timeout: 300s
          command_timeout: 300s
          script: |
            cd /opt/aws-hybrid
            chmod +x automation/deploy.sh
            export GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            export GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            export GHCR_OWNER="${{ needs.build-and-push.outputs.owner_lc }}"
            ./automation/deploy.sh production "${{ needs.build-and-push.outputs.image_tag }}"
