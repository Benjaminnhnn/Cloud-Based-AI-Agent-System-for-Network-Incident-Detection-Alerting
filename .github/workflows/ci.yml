name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches:
      - "feature/**"
      - develop
      - main

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent_src/requirements.txt
          pip install -r demo-web/backend/requirements.txt
          pip install pytest ruff "httpx<0.28"

      - name: Lint (critical rules)
        run: |
          ruff check agent_src demo-web/backend/app --select E9,F63,F7,F82

      - name: Test AI Agent (pytest)
        env:
          PYTHONPATH: agent_src
        run: pytest -q agent_src/tests

      - name: Test Backend API (pytest)
        env:
          PYTHONPATH: demo-web/backend
        run: pytest -q demo-web/backend/tests

      - name: Build AI Agent image
        run: docker build -t local/ai-agent:ci-${{ github.sha }} agent_src

      - name: Build Payment API image
        run: docker build -t local/payment-api:ci-${{ github.sha }} demo-web/backend

      - name: Validate Docker Compose files
        run: |
          cp release/.env.example release/.env.staging
          cp release/.env.example release/.env.production
          docker compose -f release/docker-compose.staging.yml config > /dev/null
          docker compose -f release/docker-compose.production.yml config > /dev/null
